version: "3.8"

services:
  tdah-api:
    image: tdah-api:latest
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - PORT=3333
      - CORS_ORIGIN=${CORS_ORIGIN:-https://tdah-portal.vercel.app}
      - NODE_ENV=production
    networks:
      - network_public
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.tdah-api.rule=Host(`api.method1.cloud`)"
        - "traefik.http.routers.tdah-api.entrypoints=websecure"
        - "traefik.http.routers.tdah-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.tdah-api.loadbalancer.server.port=3333"
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  network_public:
    external: true
